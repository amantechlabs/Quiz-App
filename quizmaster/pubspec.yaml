name: quizmaster_pro
description: QuizMaster Pro - offline multi-profile quiz app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  provider: ^6.1.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/questions.json
