name: Build Flutter APK

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: quizmaster

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  # ✅ Java required for Gradle
  - name: Set up Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  - name: Install Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.24.0'
      cache: true

  # ✅ Clean (VERY IMPORTANT)
  - name: Clean project
    run: flutter clean

  - name: Get dependencies
    run: flutter pub get

  # ✅ FIXED (dart run instead of flutter pub run)
  - name: Generate Drift files
    run: dart run build_runner build --delete-conflicting-outputs

  - name: Build APK
    run: flutter build apk --release

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: app-release
      path: quizmaster/build/app/outputs/flutter-apk/app-release.apk
```
